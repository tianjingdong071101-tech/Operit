name: Build Debug APK

on:
  push:
    branches: [ main, master, build-* ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 build-tools;35.0.0 platform-tools ndk;27.0.12077973'

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Fix MNN KLEIDIAI (skip external download)
        run: |
          sed -i '/-DMNN_CPU_WEIGHT_DEQUANT_GEMM=ON/a\                    "-DMNN_KLEIDIAI=OFF",' mnn/build.gradle.kts
          sed -i 's/-DMNN_CPU_WEIGHT_DEQUANT_GEMM=ON"/-DMNN_CPU_WEIGHT_DEQUANT_GEMM=ON",/' mnn/build.gradle.kts

      - name: Skip sherpa-ncnn native build (speech lib, optional)
        run: |
          python3 -c "
          lines = open('app/src/main/cpp/CMakeLists.txt').read().split('\n')
          out = []
          in_block = False
          for l in lines:
              if 'if(ANDROID)' in l:
                  in_block = True
                  out.append(l)
              elif in_block:
                  if l.strip() == 'endif()':
                      in_block = False
                      out.append(l)
                  else:
                      out.append('#' + l)
              else:
                  out.append(l)
          open('app/src/main/cpp/CMakeLists.txt', 'w').write('\n'.join(out))
          "

      - name: Build APK
        run: ./gradlew :app:assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m"

      - name: Find APK
        id: apk
        run: |
          APK=$(find app/build/outputs -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: operit-debug-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 7
